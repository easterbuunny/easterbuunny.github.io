services:
  backend-api:
    build: ./backend
    container_name: java-api
    ports:
      - "8000:8080"
    networks:
      - app-network

  frontend-web:
    build: ./frontend
    container_name: angular-web
    ports:
      - "4000:80"
    depends_on:
      - backend-api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
