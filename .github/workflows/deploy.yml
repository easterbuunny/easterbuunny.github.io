name: Déploiement du Portfolio Angular

on:
  push:
    branches:
      - main # Changez en 'develop' si vous déployez vraiment depuis develop

# Permissions nécessaires pour que GitHub Actions puisse déployer sur Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Empêche les déploiements concurrents
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Job 1 : Compilation du code Angular
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'

      - name: Installer les dépendances
        run: npm ci

      - name: Compiler le projet Angular
        run: npx ng build --configuration production
        # Note: --base-href / a été retiré car c'est le comportement par défaut d'Angular

      - name: Préparer l'artefact pour GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # ATTENTION : Vérifiez que 'portfolio' est bien le nom de votre projet
          # dans le fichier angular.json
          path: './dist/portfolio/browser'

  # Job 2 : Déploiement
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
